- capabilityId: cap_grid_event_simulation
  name: Grid Event Simulation
  productAreaId: prod_grid_simulation
  status: pilot_only
  customerFacingDescription: Simulates grid-event workflows using replayed or redacted event data.
  internalNotes: No production control-plane connection is created during pilot simulations.
  allowedInPilot: true
  requiresApproval: false
  approvalOwnerPersonId: person_helio_grid_energy_theo_grant
  supportedIntegrations:
  - replayed_event_files
  - operator_console_preview
  unsupportedIntegrations:
  - live_scada_control
  - grid_dispatch_api
  promiseGuardPolicy:
    allowedClaims:
    - During the pilot, we can simulate grid-dispatch workflows.
    blockedClaims:
    - We can enable live grid-dispatch automation during the pilot.
    safeAlternativeWording:
    - During the pilot, we can simulate grid-dispatch workflows and route recommendations for operator approval before any
      live automation is considered.
- capabilityId: cap_operator_approval_queue
  name: Operator Approval Queue
  productAreaId: prod_operator_approval
  status: beta
  customerFacingDescription: Routes simulated recommendations to named operators for approval and audit logging.
  internalNotes: Queue labels must avoid implying live dispatch authority.
  allowedInPilot: true
  requiresApproval: true
  approvalOwnerPersonId: person_helio_grid_energy_nora_bell
  supportedIntegrations:
  - operator_console_preview
  unsupportedIntegrations:
  - automatic_dispatch
  promiseGuardPolicy:
    allowedClaims:
    - We can route recommendations for operator approval during the pilot.
    blockedClaims:
    - The approval queue can approve live grid actions during the pilot.
    safeAlternativeWording:
    - The operator approval queue can capture human approval decisions for simulated recommendations during the pilot.
- capabilityId: cap_live_grid_dispatch
  name: Live Grid Dispatch Automation
  productAreaId: prod_live_automation
  status: unsupported
  customerFacingDescription: Live dispatch automation is not available for pilot accounts.
  internalNotes: No live grid-affecting external actions are permitted without a signed safety amendment.
  allowedInPilot: false
  requiresApproval: true
  approvalOwnerPersonId: person_helio_grid_energy_theo_grant
  supportedIntegrations: []
  unsupportedIntegrations:
  - live_scada_control
  - grid_dispatch_api
  - external_grid_control_plane
  promiseGuardPolicy:
    allowedClaims:
    - Live automation can be evaluated after pilot safety review and contract amendment.
    blockedClaims:
    - We can enable live grid-dispatch automation during the pilot.
    safeAlternativeWording:
    - During the pilot, we can simulate grid-dispatch workflows and route recommendations for operator approval before any
      live automation is considered.
